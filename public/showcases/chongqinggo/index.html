<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重庆48小时漫游记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--accent:#ff6b35;--red:#e63946;
  --gold:#ffd166;--blue:#118ab2;--green:#06d6a0;--text:#f1faee;
  --dim:#8d99ae;--card-r:16px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none;}
#app{height:100%;width:100%;position:relative;overflow:hidden;}

/* ===== Screens ===== */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .5s,transform .5s;opacity:0;pointer-events:none;transform:scale(.96);}
.screen.active{opacity:1;pointer-events:auto;transform:scale(1);}

/* ===== Title Screen ===== */
#title{justify-content:flex-end;align-items:center;padding:40px 24px 60px;text-align:center;background:linear-gradient(180deg,#0a0a1a 0%,#1a1030 40%,#2d1b4e 70%,#4a2068 100%);}
.title-top{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.city-scape{position:relative;width:100%;max-width:360px;height:120px;margin-bottom:20px;}
.building{position:absolute;bottom:0;background:#2a2040;border-radius:4px 4px 0 0;}
.building::after{content:'';position:absolute;width:4px;height:4px;background:var(--gold);border-radius:50%;opacity:.7;animation:twinkle 2s infinite alternate;}
.b1{left:10%;width:30px;height:60px;}.b1::after{top:12px;left:8px;}
.b2{left:20%;width:22px;height:90px;background:#352a50;}.b2::after{top:20px;left:6px;animation-delay:.3s;}
.b3{left:30%;width:40px;height:70px;}.b3::after{top:15px;left:18px;animation-delay:.7s;}
.b4{left:42%;width:18px;height:105px;background:#3d2d5c;}.b4::after{top:8px;left:5px;animation-delay:1s;}
.b5{left:50%;width:35px;height:80px;}.b5::after{top:25px;left:12px;animation-delay:.5s;}
.b6{left:62%;width:25px;height:95px;background:#352a50;}.b6::after{top:10px;left:10px;animation-delay:1.2s;}
.b7{left:72%;width:38px;height:65px;}.b7::after{top:18px;left:20px;animation-delay:.8s;}
.b8{left:83%;width:20px;height:85px;background:#3d2d5c;}.b8::after{top:14px;left:7px;animation-delay:.4s;}
.bridge{position:absolute;bottom:0;left:5%;right:5%;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3;}
.river{position:absolute;bottom:-5px;left:0;right:0;height:20px;background:linear-gradient(180deg,rgba(17,138,178,.2),transparent);}
@keyframes twinkle{0%{opacity:.3}100%{opacity:1}}
.title-emoji{font-size:48px;margin-bottom:8px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#title h1{font-size:32px;font-weight:800;letter-spacing:2px;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#title .sub{color:var(--dim);font-size:14px;margin-bottom:6px;}
#title .sub2{color:var(--dim);font-size:12px;margin-bottom:32px;opacity:.7;}
.start-btn{padding:16px 48px;font-size:18px;font-weight:700;border:none;border-radius:50px;background:linear-gradient(135deg,var(--accent),var(--red));color:#fff;cursor:pointer;letter-spacing:2px;box-shadow:0 4px 24px rgba(255,107,53,.4);transition:transform .2s,box-shadow .2s;}
.start-btn:active{transform:scale(.95);box-shadow:0 2px 12px rgba(255,107,53,.3);}
.weather-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:rgba(255,255,255,.08);font-size:12px;color:var(--dim);margin-bottom:24px;}

/* ===== Game Screen ===== */
#game{background:var(--bg);}
.game-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;position:relative;z-index:10;}
.day-label{font-size:12px;color:var(--dim);font-weight:600;letter-spacing:1px;}
.stamp-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:rgba(255,209,102,.12);border:1px solid rgba(255,209,102,.2);color:var(--gold);font-size:13px;font-weight:600;cursor:pointer;}
.stamp-btn .count{background:var(--gold);color:var(--bg);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.scene-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 16px 100px;}
.scene-area::-webkit-scrollbar{display:none;}

/* Scene Cards */
.scene-card{background:var(--card);border-radius:var(--card-r);margin-bottom:16px;overflow:hidden;animation:cardIn .4s ease-out both;}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-card:nth-child(2){animation-delay:.1s;}
.scene-card:nth-child(3){animation-delay:.2s;}
.scene-card:nth-child(4){animation-delay:.3s;}
.scene-card:nth-child(5){animation-delay:.4s;}
.scene-hero{position:relative;padding:28px 20px 20px;overflow:hidden;}
.scene-hero::before{content:'';position:absolute;inset:0;opacity:.15;}
.scene-hero .emoji{font-size:36px;margin-bottom:8px;display:block;}
.scene-hero h2{font-size:22px;font-weight:800;margin-bottom:4px;position:relative;}
.scene-hero .time{font-size:12px;color:var(--dim);position:relative;}
.scene-body{padding:16px 20px 20px;}
.scene-body p{font-size:14px;line-height:1.8;color:var(--dim);margin-bottom:12px;}
.scene-body p strong{color:var(--text);}

/* Tip Box */
.tip-box{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.15);border-radius:12px;padding:14px 16px;margin:12px 0;cursor:pointer;transition:all .3s;}
.tip-box.open{background:rgba(255,209,102,.1);}
.tip-header{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--gold);}
.tip-header .arrow{transition:transform .3s;font-size:10px;}
.tip-box.open .tip-header .arrow{transform:rotate(90deg);}
.tip-content{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s;font-size:13px;line-height:1.7;color:var(--dim);}
.tip-box.open .tip-content{max-height:500px;padding-top:10px;}

/* Food Cards */
.food-scroll{display:flex;gap:12px;overflow-x:auto;padding:4px 0 12px;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;}
.food-scroll::-webkit-scrollbar{display:none;}
.food-card{flex:0 0 220px;scroll-snap-align:start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.food-card:active{transform:scale(.97);}
.food-card.selected{border-color:var(--accent);background:rgba(255,107,53,.08);}
.food-card .f-emoji{font-size:28px;margin-bottom:8px;}
.food-card .f-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.food-card .f-addr{font-size:11px;color:var(--dim);margin-bottom:8px;}
.food-card .f-desc{font-size:12px;color:var(--dim);line-height:1.6;}
.food-card .f-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-top:8px;}
.food-card .f-tag.hot{background:rgba(230,57,70,.15);color:var(--red);}
.food-card .f-tag.rec{background:rgba(6,214,160,.12);color:var(--green);}
.food-card .f-tag.old{background:rgba(255,209,102,.12);color:var(--gold);}
.food-card .f-price{font-size:11px;color:var(--accent);margin-top:6px;font-weight:600;}
.food-card .f-menu{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5;}

/* Choice Buttons */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0;}
.choice-btn{padding:14px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-align:center;cursor:pointer;transition:all .3s;font-size:13px;color:var(--text);}
.choice-btn:active{transform:scale(.96);}
.choice-btn.picked{border-color:var(--green);background:rgba(6,214,160,.1);color:var(--green);}
.choice-btn .c-emoji{font-size:24px;display:block;margin-bottom:6px;}
.choice-btn .c-label{font-weight:600;}

/* Location Cards */
.loc-list{display:flex;flex-direction:column;gap:10px;margin:12px 0;}
.loc-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .3s;}
.loc-item:active{transform:scale(.98);}
.loc-item .l-emoji{font-size:24px;flex-shrink:0;}
.loc-item .l-info{flex:1;}
.loc-item .l-name{font-size:14px;font-weight:700;margin-bottom:2px;}
.loc-item .l-meta{font-size:11px;color:var(--dim);}
.loc-item .l-check{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .3s;flex-shrink:0;}
.loc-item.visited .l-check{border-color:var(--green);background:var(--green);color:var(--bg);}
.loc-detail{max-height:0;overflow:hidden;transition:max-height .4s ease;font-size:12px;line-height:1.7;color:var(--dim);padding:0 14px;}
.loc-item.expanded+.loc-detail{max-height:300px;padding:8px 14px 14px;}

/* Stamp Collect Animation */
.stamp-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(15,15,26,.95);border:2px solid var(--gold);border-radius:20px;padding:32px 40px;text-align:center;z-index:100;transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
.stamp-toast.show{transform:translate(-50%,-50%) scale(1);}
.stamp-toast .st-emoji{font-size:48px;display:block;margin-bottom:8px;}
.stamp-toast .st-text{font-size:14px;color:var(--gold);font-weight:700;}
.stamp-toast .st-name{font-size:18px;font-weight:800;margin-top:4px;}

/* ===== Bottom Nav ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:4px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 30%);z-index:20;}
.nav-dot{width:auto;padding:8px 16px;border-radius:20px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s;background:rgba(255,255,255,.06);color:var(--dim);}
.nav-dot.active{background:var(--accent);color:#fff;}
.nav-dot.done{background:rgba(6,214,160,.15);color:var(--green);}

/* ===== Stamp Modal ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal-content{position:fixed;bottom:0;left:0;right:0;max-height:80vh;background:var(--card);border-radius:20px 20px 0 0;z-index:51;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);}
.modal-overlay.show .modal-content{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto;}
.modal-title{font-size:18px;font-weight:800;padding:8px 20px 16px;text-align:center;}
.stamp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:0 20px 30px;}
.stamp-cell{aspect-ratio:1;border-radius:14px;background:rgba(255,255,255,.03);border:2px dashed rgba(255,255,255,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:all .3s;padding:8px;}
.stamp-cell.earned{border:2px solid var(--gold);background:rgba(255,209,102,.06);animation:stampEarn .5s ease;}
@keyframes stampEarn{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.stamp-cell .s-emoji{font-size:28px;margin-bottom:4px;}
.stamp-cell .s-name{font-size:11px;font-weight:600;color:var(--dim);}
.stamp-cell.earned .s-name{color:var(--gold);}
.stamp-cell .s-lock{font-size:24px;opacity:.2;}

/* ===== End Screen ===== */
#ending{justify-content:center;align-items:center;padding:40px 24px;text-align:center;background:linear-gradient(180deg,#0a0a1a,#1a1030 50%,#2d1b4e);}
#ending .end-emoji{font-size:64px;margin-bottom:16px;animation:float 3s ease-in-out infinite;}
#ending h2{font-size:28px;font-weight:800;margin-bottom:8px;}
#ending .end-sub{color:var(--dim);font-size:14px;margin-bottom:24px;line-height:1.6;}
.end-stats{display:flex;gap:20px;margin-bottom:32px;}
.end-stat{text-align:center;}
.end-stat .es-num{font-size:36px;font-weight:800;color:var(--gold);}
.end-stat .es-label{font-size:12px;color:var(--dim);}
.restart-btn{padding:14px 36px;font-size:15px;font-weight:700;border:none;border-radius:50px;background:rgba(255,255,255,.08);color:var(--text);cursor:pointer;}

/* ===== Music Button ===== */
.music-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .3s;flex-shrink:0;}
.music-btn:active{transform:scale(.9);}
.music-btn.playing{border-color:rgba(6,214,160,.4);background:rgba(6,214,160,.1);animation:pulse-music 2s ease-in-out infinite;}
@keyframes pulse-music{0%,100%{box-shadow:0 0 0 0 rgba(6,214,160,.2)}50%{box-shadow:0 0 0 6px rgba(6,214,160,0)}}
.header-right{display:flex;align-items:center;gap:8px;}

/* ===== Weather Effects ===== */
.rain-container{position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden;}
.raindrop{position:absolute;width:1px;background:linear-gradient(transparent,rgba(174,194,224,.3));animation:rain linear infinite;}
@keyframes rain{0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}}

/* ===== Misc ===== */
.divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0;}
.section-label{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin:16px 0 8px;padding-left:2px;}
.highlight{color:var(--accent);font-weight:700;}
.highlight-green{color:var(--green);font-weight:700;}
.highlight-gold{color:var(--gold);font-weight:700;}

/* Progress Bar */
.progress-wrap{padding:0 16px;margin-bottom:8px;}
.progress-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .5s ease;border-radius:2px;}

/* Scrollbar */
.scene-area::-webkit-scrollbar{width:0;}

/* Quiz */
.quiz-box{background:rgba(17,138,178,.08);border:1px solid rgba(17,138,178,.2);border-radius:14px;padding:16px;margin:12px 0;}
.quiz-q{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:12px;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:13px;transition:all .3s;display:flex;align-items:center;gap:10px;}
.quiz-opt:active{transform:scale(.98);}
.quiz-opt .q-letter{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.quiz-opt.correct{border-color:var(--green);background:rgba(6,214,160,.1);color:var(--green);}
.quiz-opt.correct .q-letter{background:var(--green);color:var(--bg);}
.quiz-opt.wrong{border-color:var(--red);background:rgba(230,57,70,.08);color:var(--red);opacity:.5;}
.quiz-result{font-size:12px;color:var(--dim);margin-top:10px;line-height:1.6;padding:10px;background:rgba(255,255,255,.03);border-radius:8px;}

/* Banner */
.day-banner{text-align:center;padding:24px 16px 12px;}
.day-banner .db-day{font-size:28px;font-weight:800;margin-bottom:2px;}
.day-banner .db-date{font-size:12px;color:var(--dim);}
.day-banner .db-weather{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:12px;background:rgba(255,255,255,.05);font-size:11px;color:var(--dim);margin-top:6px;}

@media(min-width:500px){
  #app{max-width:430px;margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.5);}
  .bottom-nav{max-width:430px;left:50%;transform:translateX(-50%);}
  .modal-overlay,.rain-container{max-width:430px;left:50%;transform:translateX(-50%);}
  .stamp-toast{max-width:430px;transform:translate(-50%,-50%) scale(0);}
  .stamp-toast.show{transform:translate(-50%,-50%) scale(1);}
  .modal-content{max-width:430px;width:100%;left:50%;right:auto;transform:translateX(-50%) translateY(100%);}
  .modal-overlay.show .modal-content{transform:translateX(-50%) translateY(0);}
}
</style>
</head>
<body>
<div id="app">
  <!-- Title Screen -->
  <div id="title" class="screen active">
    <div class="title-top">
      <div class="city-scape">
        <div class="building b1"></div><div class="building b2"></div>
        <div class="building b3"></div><div class="building b4"></div>
        <div class="building b5"></div><div class="building b6"></div>
        <div class="building b7"></div><div class="building b8"></div>
        <div class="bridge"></div><div class="river"></div>
      </div>
      <div class="title-emoji">🏙️</div>
      <h1>重庆48小时漫游记</h1>
      <p class="sub">一份藏在游戏里的旅行攻略</p>
      <p class="sub2">4月10日 - 4月12日 ｜ 吃50% 人文30% 打卡20%</p>
      <div class="weather-badge">🌧️ 周五有雨 20-25°C ｜ ⛅ 周六多云 17-24°C ｜ ☀️ 周日晴暖 21-29°C</div>
    </div>
    <button class="start-btn" onclick="game.start()">开始冒险 →</button>
  </div>

  <!-- Game Screen -->
  <div id="game" class="screen">
    <div class="game-header">
      <span class="day-label" id="dayLabel">DAY 1</span>
      <div class="header-right">
        <div class="music-btn" id="musicBtn" onclick="music.toggle()" title="背景音乐">🔇</div>
        <div class="stamp-btn" onclick="game.showStamps()">
          🏅 印章 <span class="count" id="stampCount">0</span>
        </div>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
    <div class="scene-area" id="sceneArea"></div>
    <div class="bottom-nav" id="bottomNav"></div>
  </div>

  <!-- End Screen -->
  <div id="ending" class="screen">
    <div class="end-emoji">🎉</div>
    <h2>攻略解锁完成！</h2>
    <p class="end-sub">重庆在等你。<br>带上这份攻略，吃好喝好，一路顺风。</p>
    <div class="end-stats">
      <div class="end-stat"><div class="es-num" id="endStamps">0</div><div class="es-label">印章收集</div></div>
      <div class="end-stat"><div class="es-num" id="endPlaces">0</div><div class="es-label">地点解锁</div></div>
      <div class="end-stat"><div class="es-num" id="endFoods">0</div><div class="es-label">美食发现</div></div>
    </div>
    <button class="restart-btn" onclick="game.restart()">再玩一次</button>
  </div>

  <!-- Stamp Modal -->
  <div class="modal-overlay" id="stampModal" onclick="game.hideStamps(event)">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <div class="modal-title">🏅 印章收集册</div>
      <div class="stamp-grid" id="stampGrid"></div>
    </div>
  </div>

  <!-- Stamp Toast -->
  <div class="stamp-toast" id="stampToast">
    <span class="st-emoji" id="stEmoji"></span>
    <div class="st-text">🎊 获得新印章！</div>
    <div class="st-name" id="stName"></div>
  </div>

  <!-- Rain -->
  <div class="rain-container" id="rainContainer"></div>
</div>

<script>
const STAMPS = [
  {id:'airport',emoji:'✈️',name:'深夜着陆'},
  {id:'noodle',emoji:'🍜',name:'第一碗面'},
  {id:'culture',emoji:'🏛️',name:'人文之旅'},
  {id:'museum',emoji:'🏺',name:'博物馆达人'},
  {id:'dinner1',emoji:'🍲',name:'地道味道'},
  {id:'liziba',emoji:'🚃',name:'轻轨穿楼'},
  {id:'huangjueping',emoji:'🎨',name:'市井烟火'},
  {id:'teahouse',emoji:'🍵',name:'老茶馆'},
  {id:'hotpot',emoji:'🔥',name:'火锅之魂'},
  {id:'return',emoji:'🌅',name:'完美旅程'},
];

const CHAPTERS = [
  // ===== DAY 1 =====
  {

// ===== HELPER FUNCTIONS =====
function makeTip(title, content) {
  return `<div class="tip-box" onclick="this.classList.toggle('open')"><div class="tip-header"><span>💡</span> ${title} <span class="arrow">▶</span></div><div class="tip-content">${content}</div></div>`;
}

function makeFoodCard(emoji, name, addr, time, desc, tagType, menu, extra) {
  const tagMap = {hot:'辣',rec:'推荐',old:'老字号'};
  const tag = tagType ? `<div class="f-tag ${tagType}">${extra||tagMap[tagType]||tagType}</div>` : '';
  return `<div class="food-card"><div class="f-emoji">${emoji}</div><div class="f-name">${name}</div><div class="f-addr">${addr}${time?' · '+time:''}</div><div class="f-desc">${desc}</div>${menu?'<div class="f-menu">'+menu+'</div>':''}${tag}</div>`;
}

function makeLocItem(id, emoji, name, meta, extra) {
  return `<div class="loc-item" id="${id}" onclick="game.toggleLoc('${id}')"><span class="l-emoji">${emoji}</span><div class="l-info"><div class="l-name">${name}</div><div class="l-meta">${meta}${extra?'<br>'+extra:''}</div></div><div class="l-check">✓</div></div>`;
}

// ===== GAME CLASS =====
const game = {
  currentChapter: 0,
  stamps: new Set(),
  quizAnswered: {},
  choices: {},
  visitedLocs: new Set(),

  start() {
    document.getElementById('title').classList.remove('active');
    document.getElementById('game').classList.add('active');
    this.renderNav();
    this.showChapter(0);
    this.startRain();
  },

  restart() {
    this.currentChapter = 0;
    this.stamps = new Set();
    this.quizAnswered = {};
    this.choices = {};
    this.visitedLocs = new Set();
    document.getElementById('ending').classList.remove('active');
    document.getElementById('title').classList.add('active');
  },

  showChapter(idx) {
    if (idx < 0 || idx >= CHAPTERS.length) return;
    this.currentChapter = idx;
    const ch = CHAPTERS[idx];
    const area = document.getElementById('sceneArea');
    area.scrollTop = 0;

    // Day label
    const dayLabels = ['DAY 1 · 周五','DAY 1 · 周五','DAY 1 · 周五','DAY 1 · 周五','DAY 1 · 周五','DAY 1 · 周五','DAY 2 · 周六','DAY 2 · 周六','DAY 2 · 周六','DAY 3 · 周日'];
    document.getElementById('dayLabel').textContent = dayLabels[idx] || 'DAY '+ ch.day;

    // Day banner + weather
    const weathers = {1:'🌧️ 闷热有雨 18-25°C',2:'⛅ 多云偶雨 17-24°C',3:'☀️ 晴暖 21-29°C'};
    const bannerHTML = `<div class="day-banner"><div class="db-weather">${weathers[ch.day]}</div></div>`;

    // Scene card
    let html = bannerHTML;
    html += `<div class="scene-card"><div class="scene-hero" style="background:${ch.heroGrad}"><span class="emoji">${ch.emoji}</span><h2>${ch.title}</h2><div class="time">${ch.subtitle}</div></div><div class="scene-body" id="scene-body"></div></div>`;

    // Stamp collect button (if not yet earned)
    if (ch.stamp && !this.stamps.has(ch.stamp)) {
      html += `<div style="text-align:center;padding:12px 0;"><button style="padding:12px 28px;border-radius:50px;border:2px solid var(--gold);background:rgba(255,209,102,.08);color:var(--gold);font-size:14px;font-weight:700;cursor:pointer;" onclick="game.collectStamp('${ch.stamp}')">🏅 收集印章：${STAMPS.find(s=>s.id===ch.stamp).name}</button></div>`;
    } else if (ch.stamp && this.stamps.has(ch.stamp)) {
      html += `<div style="text-align:center;padding:12px 0;color:var(--green);font-size:13px;">✅ 已收集：${STAMPS.find(s=>s.id===ch.stamp).name}</div>`;
    }

    area.innerHTML = html;
    ch.render(document.getElementById('scene-body'));

    // Restore quiz states
    Object.keys(this.quizAnswered).forEach(qid => {
      const data = this.quizAnswered[qid];
      const quiz = document.getElementById('quiz-'+qid);
      if (!quiz) return;
      const opts = quiz.querySelectorAll('.quiz-opt');
      opts.forEach((o,i) => {
        if (i === QUIZ_ANSWERS[qid].correct) o.classList.add('correct');
        else if (i === data.picked) o.classList.add('wrong');
        o.style.pointerEvents = 'none';
      });
      const r = document.getElementById('quizResult-'+qid);
      if (r) { r.style.display = 'block'; r.innerHTML = data.text; }
    });

    // Restore loc visits
    this.visitedLocs.forEach(lid => {
      const el = document.getElementById(lid);
      if (el) el.classList.add('visited');
    });

    // Restore choices
    if (this.choices.dinner2) {
      const detail = document.getElementById('dinner2-detail');
      if (detail) detail.innerHTML = DINNER2_DETAILS[this.choices.dinner2] || '';
    }

    // Update nav
    this.updateNav();
    this.updateProgress();
    this.updateStampCount();

    // Rain control
    const rain = document.getElementById('rainContainer');
    rain.style.display = ch.day === 1 ? 'block' : 'none';
  },

  renderNav() {
    const nav = document.getElementById('bottomNav');
    let html = '';
    CHAPTERS.forEach((ch, i) => {
      const short = ['着陆','早餐','人文','博物馆','晚餐','李子坝','黄桷坪','茶馆','火锅','归途'];
      html += `<div class="nav-dot" data-idx="${i}" onclick="game.showChapter(${i})">${short[i]||ch.title}</div>`;
    });
    nav.innerHTML = html;
  },

  updateNav() {
    document.querySelectorAll('.nav-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === this.currentChapter);
      const ch = CHAPTERS[i];
      dot.classList.toggle('done', ch.stamp && this.stamps.has(ch.stamp));
    });
    // Scroll active nav dot into view
    const activeDot = document.querySelector('.nav-dot.active');
    if (activeDot) activeDot.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  },

  updateProgress() {
    const pct = ((this.currentChapter + 1) / CHAPTERS.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
  },

  updateStampCount() {
    document.getElementById('stampCount').textContent = this.stamps.size;
  },

  collectStamp(id) {
    if (this.stamps.has(id)) return;
    this.stamps.add(id);
    const stamp = STAMPS.find(s => s.id === id);
    // Show toast
    document.getElementById('stEmoji').textContent = stamp.emoji;
    document.getElementById('stName').textContent = stamp.name;
    const toast = document.getElementById('stampToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
    this.updateStampCount();
    this.updateNav();
    // Refresh the collect button
    this.showChapter(this.currentChapter);
    // Check completion
    if (this.stamps.size === STAMPS.length) {
      setTimeout(() => this.showEnding(), 2000);
    }
  },

  showStamps() {
    const grid = document.getElementById('stampGrid');
    grid.innerHTML = STAMPS.map(s => {
      const earned = this.stamps.has(s.id);
      return `<div class="stamp-cell ${earned?'earned':''}"><span class="${earned?'s-emoji':'s-lock'}">${earned?s.emoji:'🔒'}</span><span class="s-name">${earned?s.name:'???'}</span></div>`;
    }).join('');
    document.getElementById('stampModal').classList.add('show');
  },

  hideStamps(e) {
    if (e.target === e.currentTarget) {
      document.getElementById('stampModal').classList.remove('show');
    }
  },

  answerQuiz(qid, idx, el) {
    if (this.quizAnswered[qid]) return;
    const qa = QUIZ_ANSWERS[qid];
    const quiz = document.getElementById('quiz-'+qid);
    const opts = quiz.querySelectorAll('.quiz-opt');
    opts.forEach((o, i) => {
      if (i === qa.correct) o.classList.add('correct');
      else if (i === idx) o.classList.add('wrong');
      o.style.pointerEvents = 'none';
    });
    const r = document.getElementById('quizResult-'+qid);
    r.style.display = 'block';
    r.innerHTML = qa.texts[idx];
    this.quizAnswered[qid] = {picked: idx, text: qa.texts[idx]};
  },

  toggleLoc(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const wasExpanded = el.classList.contains('expanded');
    // Close all
    document.querySelectorAll('.loc-item.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasExpanded) {
      el.classList.add('expanded');
      el.classList.add('visited');
      this.visitedLocs.add(id);
    }
  },

  makeChoice(group, value, el) {
    this.choices[group] = value;
    const parent = el.parentElement;
    parent.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('picked'));
    el.classList.add('picked');
    const detail = document.getElementById(group+'-detail');
    if (detail && DINNER2_DETAILS[value]) {
      detail.innerHTML = DINNER2_DETAILS[value];
    }
  },

  showEnding() {
    document.getElementById('game').classList.remove('active');
    document.getElementById('ending').classList.add('active');
    document.getElementById('endStamps').textContent = this.stamps.size;
    document.getElementById('endPlaces').textContent = this.visitedLocs.size;
    document.getElementById('endFoods').textContent = '6+';
    document.getElementById('rainContainer').style.display = 'none';
  },

  startRain() {
    const container = document.getElementById('rainContainer');
    container.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const drop = document.createElement('div');
      drop.className = 'raindrop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.height = Math.random() * 18 + 8 + 'px';
      drop.style.animationDuration = Math.random() * 0.5 + 0.6 + 's';
      drop.style.animationDelay = Math.random() * 2 + 's';
      drop.style.opacity = Math.random() * 0.3 + 0.1;
      container.appendChild(drop);
    }
  }
};

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  if (!document.getElementById('game').classList.contains('active')) return;
  const diff = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(diff) > 80) {
    if (diff < 0 && game.currentChapter < CHAPTERS.length - 1) game.showChapter(game.currentChapter + 1);
    else if (diff > 0 && game.currentChapter > 0) game.showChapter(game.currentChapter - 1);
  }
}, {passive:true});

// ===== MUSIC ENGINE (Web Audio API) =====
const music = {
  ctx: null,
  playing: false,
  masterGain: null,
  delayNode: null,
  nodes: [],
  timers: [],

  // Chinese pentatonic (higher registers, airy)
  // C5  D5   E5   G5   A5   C6   D6   E6
  scale: [523.3, 587.3, 659.3, 784.0, 880.0, 1046.5, 1174.7, 1318.5],

  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Master gain (keep low for gentle sound)
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0;

    // High-pass filter to remove any low-end rumble
    const hiPass = this.ctx.createBiquadFilter();
    hiPass.type = 'highpass';
    hiPass.frequency.value = 300;
    hiPass.Q.value = 0.5;

    // Delay for spacious reverb-like feel
    this.delayNode = this.ctx.createDelay(1);
    this.delayNode.delayTime.value = 0.4;
    const delayGain = this.ctx.createGain();
    delayGain.gain.value = 0.25;
    const delayFilter = this.ctx.createBiquadFilter();
    delayFilter.type = 'lowpass';
    delayFilter.frequency.value = 2000;

    // Routing: master → hiPass → destination
    //          master → delay → filter → delayGain → destination
    //                   delay ← delayGain (feedback)
    this.masterGain.connect(hiPass);
    hiPass.connect(this.ctx.destination);

    this.masterGain.connect(this.delayNode);
    this.delayNode.connect(delayFilter);
    delayFilter.connect(delayGain);
    delayGain.connect(this.ctx.destination);
    delayGain.connect(this.delayNode); // feedback loop
  },

  toggle() {
    this.init();
    if (this.playing) this.stop(); else this.play();
  },

  updateBtn() {
    const btn = document.getElementById('musicBtn');
    if (!btn) return;
    btn.textContent = this.playing ? '🎵' : '🔇';
    btn.classList.toggle('playing', this.playing);
  },

  play() {
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.playing = true;
    this.updateBtn();
    this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime);
    this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, this.ctx.currentTime);
    this.masterGain.gain.linearRampToValueAtTime(0.3, this.ctx.currentTime + 2);
    this.startMelody();
    this.startChimes();
    this.startPad();
  },

  stop() {
    this.playing = false;
    this.updateBtn();
    if (this.masterGain) {
      this.masterGain.gain.cancelScheduledValues(this.ctx.currentTime);
      this.masterGain.gain.setValueAtTime(this.masterGain.gain.value, this.ctx.currentTime);
      this.masterGain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.2);
    }
    this.timers.forEach(t => clearTimeout(t));
    this.timers = [];
    setTimeout(() => {
      this.nodes.forEach(n => { try { n.stop(); } catch(e){} });
      this.nodes = [];
    }, 1500);
  },

  // Soft high-register pad (no low rumble)
  startPad() {
    const root = 523.3; // C5
    const fifth = 784.0; // G5

    const makePadVoice = (freq, vol) => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      const filter = this.ctx.createBiquadFilter();
      osc.type = 'sine';
      osc.frequency.value = freq;
      filter.type = 'bandpass';
      filter.frequency.value = freq;
      filter.Q.value = 2;
      gain.gain.value = vol;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(this.masterGain);
      osc.start();
      this.nodes.push(osc);

      // Very slow vibrato
      const vib = this.ctx.createOscillator();
      const vibG = this.ctx.createGain();
      vib.frequency.value = 0.08;
      vibG.gain.value = 2;
      vib.connect(vibG);
      vibG.connect(osc.frequency);
      vib.start();
      this.nodes.push(vib);
    };

    makePadVoice(root, 0.04);
    makePadVoice(fifth, 0.025);
  },

  // Pentatonic melody notes (gentle, spaced out)
  startMelody() {
    const playNote = () => {
      if (!this.playing) return;
      const freq = this.scale[Math.floor(Math.random() * 6)]; // lower part of scale
      const t = this.ctx.currentTime;

      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 2.8);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t);
      osc.stop(t + 3);

      const next = 2000 + Math.random() * 3000;
      this.timers.push(setTimeout(() => playNote(), next));
    };
    playNote();
  },

  // Sparkle chimes (very high, very quiet)
  startChimes() {
    const playChime = () => {
      if (!this.playing) return;
      const freq = this.scale[4 + Math.floor(Math.random() * 4)]; // high part
      const t = this.ctx.currentTime;

      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.045, t + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 3.5);
      osc.connect(gain);
      gain.connect(this.masterGain);
      osc.start(t);
      osc.stop(t + 4);

      const next = 4000 + Math.random() * 6000;
      this.timers.push(setTimeout(() => playChime(), next));
    };
    this.timers.push(setTimeout(() => playChime(), 3000));
  }
};
